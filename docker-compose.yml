services:
  postgres:
    image: postgres:16-alpine
    container_name: ev-charging-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ev-network

  redis:
    image: redis:7-alpine
    container_name: ev-charging-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ev-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ev-charging-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ev-network

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: ev-charging-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - ev-network

  station-service:
    build: ./Backend/station-service
    container_name: ev-charging-station
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stations_db
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ev-network

  user-service:
    build: ./Backend/user-service
    container_name: ev-charging-user
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/users_db
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ev-network

  booking-service:
    build: ./Backend/booking-service
    container_name: ev-charging-booking
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bookings_db
      FEIGN_STATION_SERVICE_URL: http://station-service:8081
      FEIGN_PAYMENT_SERVICE_URL: http://payment-service:8084
      SPRING_RABBITMQ_HOST: rabbitmq
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      station-service:
        condition: service_started
    networks:
      - ev-network

  payment-service:
    build: ./Backend/payment-service
    container_name: ev-charging-payment
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payments_db
      FEIGN_BOOKING_SERVICE_URL: http://booking-service:8083
      SPRING_RABBITMQ_HOST: rabbitmq
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ev-network

  notification-service:
    build: ./Backend/notification-service
    container_name: ev-charging-notification
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notif_db
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_MAIL_HOST: mailhog
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - ev-network

  api-gateway:
    build: ./Backend/api-gateway
    container_name: ev-charging-gateway
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    depends_on:
      station-service:
        condition: service_started
      user-service:
        condition: service_started
      booking-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started
    networks:
      - ev-network

  frontend:
    build: ./Frontend
    container_name: ev-charging-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - ev-network

networks:
  ev-network:
    driver: bridge
